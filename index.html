<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Dime-ish (Simple)</title>
  <link rel="stylesheet" href="./styles.css" />
  <meta name="theme-color" content="#0b0b0f" />
</head>

<body>
  <div class="app">
    <!-- Header -->
    <header class="topbar">
      <button class="iconBtn" id="prevMonthBtn" aria-label="Previous month">‹</button>

      <div class="topbarCenter">
        <div class="monthTitle" id="monthTitle">Month YYYY</div>
        <div class="subRow">
          <input id="datePicker" class="datePicker" type="date" />
          <button class="linkBtn" id="todayBtn" type="button">Today</button>
        </div>
      </div>

      <button class="iconBtn" id="nextMonthBtn" aria-label="Next month">›</button>
    </header>

    <!-- Summary -->
    <section class="summary">
      <div class="summaryCard">
        <div class="label">Month total</div>
        <div class="value" id="monthTotal">₱0.00</div>
      </div>
      <div class="summaryCard">
        <div class="label">Selected day</div>
        <div class="value" id="dayTotal">₱0.00</div>
      </div>
    </section>

    <!-- Main layout -->
    <main class="layout">
      <!-- Left: Month day list (Dime-ish) -->
      <section class="panel daysPanel">
        <div class="panelTitle">Days</div>
        <div class="daysList" id="daysList"></div>
      </section>

      <!-- Right: Day details -->
      <section class="panel detailsPanel">
        <div class="detailsHeader">
          <div>
            <div class="panelTitle" id="selectedDateTitle">Selected date</div>
            <div class="muted" id="selectedDateSub">—</div>
          </div>
          <button class="primaryBtn" id="addBtn" type="button">+ Add</button>
        </div>

        <div class="txList" id="txList"></div>
        <div class="emptyState" id="emptyState">No transactions yet.</div>
      </section>
    </main>
  </div>

  <!-- Modal -->
  <div class="modalBackdrop hidden" id="modalBackdrop" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modalTop">
        <div class="modalTitle">Add transaction</div>
        <button class="iconBtn" id="closeModalBtn" aria-label="Close">×</button>
      </div>

      <form id="txForm" class="form">
        <label class="field">
          <span>Type</span>
          <select id="txType">
            <option value="expense" selected>Expense</option>
            <option value="income">Income</option>
          </select>
        </label>

        <label class="field">
          <span>Amount</span>
          <input id="txAmount" type="number" inputmode="decimal" step="0.01" placeholder="0.00" required />
        </label>

        <label class="field">
          <span>Category</span>
          <input id="txCategory" type="text" placeholder="e.g., Food" maxlength="24" required />
        </label>

        <label class="field">
          <span>Note (optional)</span>
          <input id="txNote" type="text" placeholder="e.g., lunch" maxlength="40" />
        </label>

        <label class="field">
          <span>Date</span>
          <input id="txDate" type="date" required />
        </label>

        <div class="row">
          <button class="ghostBtn" id="cancelBtn" type="button">Cancel</button>
          <button class="primaryBtn" type="submit">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
