<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dime-Lite</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <meta name="theme-color" content="#f6f6f6" />
</head>

<body>
  <!-- Main list screen -->
  <main id="screenList" class="screen">
    <header class="topbar">
      <button class="iconBtn" id="btnSearch" aria-label="Search">🔍</button>
      <div class="balanceWrap">
        <div class="balanceLabel">Balance</div>
        <div id="balanceValue" class="balanceValue">₱0.00</div>
      </div>
      <button class="iconBtn" id="btnFilter" aria-label="Filter">▾</button>
    </header>

    <section class="feed" id="feed"></section>

    <nav class="bottomNav">
      <button class="navBtn" aria-label="List">🗒️</button>
      <button class="navBtn" aria-label="Stats">📊</button>
      <button class="fab" id="btnAdd" aria-label="Add">＋</button>
      <button class="navBtn" aria-label="Budgets">⬛</button>
      <button class="navBtn" aria-label="Settings">⚙️</button>
    </nav>
  </main>

  <!-- Add transaction screen -->
  <main id="screenAdd" class="screen hidden">
    <header class="addTopbar">
      <button class="iconBtn" id="btnCloseAdd" aria-label="Close">✕</button>

      <div class="segmented" role="tablist">
        <button id="tabExpense" class="segBtn active" type="button">Expense</button>
        <button id="tabIncome" class="segBtn" type="button">Income</button>
      </div>

      <button class="iconBtn" id="btnSwapType" aria-label="Swap">⇄</button>
    </header>

    <section class="amountSection">
      <div class="amountRow">
        <span class="currency">₱</span>
        <div id="amountDisplay" class="amountDisplay">0</div>
      </div>

      <div class="noteRow">
        <button id="btnAddNote" class="noteBtn" type="button">≡ Add Note</button>
        <button id="btnBackspace" class="ghostSquare" type="button" aria-label="Backspace">⌫</button>
      </div>
    </section>

    <section class="metaRow">
      <button id="btnDate" class="metaBtn" type="button">
        <span class="metaIcon">📅</span>
        <span id="dateLabel">Today</span>
        <span id="timeLabel" class="metaRight">--:--</span>
      </button>

      <button id="btnCategory" class="metaBtn" type="button">
        <span class="metaIcon">⠿</span>
        <span id="categoryLabel">Category</span>
      </button>
    </section>

    <section class="keypad" id="keypad"></section>
  </main>

  <!-- Modals -->
  <dialog id="noteDialog" class="dialog">
    <form method="dialog" class="dialogCard">
      <h3>Add note</h3>
      <input id="noteInput" type="text" maxlength="80" placeholder="e.g., groceries, salary..." />
      <div class="dialogActions">
        <button class="btnGhost" value="cancel">Cancel</button>
        <button id="noteSave" class="btnPrimary" value="default">Save</button>
      </div>
    </form>
  </dialog>

  <dialog id="categoryDialog" class="dialog">
    <form method="dialog" class="dialogCard">
      <h3>Category</h3>
      <div id="categoryGrid" class="catGrid"></div>
      <div class="dialogActions">
        <button class="btnGhost" value="cancel">Close</button>
      </div>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
