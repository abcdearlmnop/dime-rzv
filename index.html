<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
  <title>Dime Offline (Lite)</title>
</head>
<body>
  <div class="app">
    <!-- Top bar -->
    <header class="topbar">
      <div class="brand">
        <div class="logo">🦉</div>
      </div>

      <div class="top-actions">
        <button class="icon-btn active" id="tabSummary" title="Summary">
          <span>◔</span>
        </button>
        <button class="icon-btn" id="tabList" title="Transactions">
          <span>▦</span>
        </button>
        <button class="icon-btn" id="tabSettings" title="Settings">
          <span>⚙</span>
        </button>
      </div>
    </header>

    <!-- Month row -->
    <section class="month-row">
      <button class="nav-btn" id="prevMonth" aria-label="Previous month">←</button>
      <div class="month-title" id="monthTitle">February 2025</div>
      <button class="nav-btn" id="nextMonth" aria-label="Next month">→</button>
    </section>

    <!-- Add -->
    <section class="add-row">
      <button class="pill-btn" id="openAdd">＋ Add</button>
      <div class="segmented" role="tablist" aria-label="Chart mode">
        <button class="seg-btn active" id="modeExpenses">Expenses</button>
        <button class="seg-btn" id="modeIncome">Income</button>
      </div>
    </section>

    <!-- Card (chart + breakdown) -->
    <main class="card">
      <div class="chart-wrap">
        <canvas id="donut" width="520" height="520" aria-label="Spending donut chart"></canvas>
      </div>

      <div class="breakdown" id="breakdown"></div>

      <div class="divider"></div>

      <div class="total-row">
        <div class="total-label">Total:</div>
        <div class="total-value" id="totalValue">$0.00</div>
      </div>
    </main>

    <!-- Bottom totals -->
    <footer class="bottom">
      <div class="mini-card">
        <div class="mini-title">Income</div>
        <div class="mini-value" id="incomeTotal">$0.00</div>
      </div>
      <div class="mini-card">
        <div class="mini-title">Expenses</div>
        <div class="mini-value" id="expenseTotal">$0.00</div>
      </div>
      <div class="mini-card">
        <div class="mini-title">Balance</div>
        <div class="mini-value" id="balanceTotal">$0.00</div>
      </div>
    </footer>
  </div>

  <!-- Add Transaction Modal -->
  <div class="modal-backdrop hidden" id="modalBackdrop"></div>
  <div class="modal hidden" id="modal">
    <div class="modal-header">
      <div class="modal-title">Add Transaction</div>
      <button class="icon-btn" id="closeAdd" aria-label="Close">✕</button>
    </div>

    <div class="modal-body">
      <div class="segmented full">
        <button class="seg-btn active" id="typeExpense">Expense</button>
        <button class="seg-btn" id="typeIncome">Income</button>
      </div>

      <label class="field">
        <span>Amount</span>
        <input id="amount" type="number" inputmode="decimal" placeholder="0.00" step="0.01" />
      </label>

      <label class="field">
        <span>Date</span>
        <input id="date" type="date" />
      </label>

      <label class="field">
        <span>Category</span>
        <select id="category"></select>
      </label>

      <label class="field">
        <span>Notes (optional)</span>
        <input id="notes" type="text" placeholder="e.g., lunch with friends" />
      </label>

      <button class="primary" id="saveTx">Save</button>
      <button class="ghost" id="exportData">Export Backup (JSON)</button>
      <label class="import">
        Import Backup (JSON)
        <input id="importFile" type="file" accept="application/json" />
      </label>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
